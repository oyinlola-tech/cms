<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Announcement - The Sacred Hearth</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
</head>
<body class="bg-[#fbf9f5] text-[#1b1c1a]">
  <header class="max-w-6xl mx-auto px-6 py-10 flex items-center justify-between">
    <a href="/" class="font-['Noto_Serif'] text-xl font-black text-[#002d1c]">The Sacred Hearth</a>
    <nav class="hidden md:flex items-center gap-8 text-sm font-semibold text-[#002d1c]/70">
      <a href="/programs" class="hover:text-[#002d1c]">Programs</a>
      <a href="/announcements" class="hover:text-[#002d1c]">Announcements</a>
      <a href="/gallery" class="hover:text-[#002d1c]">Gallery</a>
      <a href="/contact" class="hover:text-[#002d1c]">Contact</a>
    </nav>
    <a href="/announcements" class="text-sm font-bold text-[#735c00] hover:underline">Back</a>
  </header>

  <main class="max-w-6xl mx-auto px-6 pb-20">
    <div class="bg-white rounded-2xl overflow-hidden border border-[#c1c8c2]/30 shadow-sm">
      <div class="relative">
        <img id="announcement-image" class="w-full h-[320px] object-cover" src="/images/placeholder.svg" alt="Announcement cover">
        <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-8">
          <div class="flex flex-wrap items-center gap-3 mb-3">
            <span id="announcement-category" class="bg-[#fed65b] text-[#241a00] px-3 py-1 rounded text-xs font-black tracking-widest uppercase">General</span>
            <span id="announcement-date" class="text-white/80 text-xs font-semibold tracking-wider">—</span>
          </div>
          <h1 id="announcement-title" class="font-['Noto_Serif'] text-4xl md:text-5xl font-black text-white leading-tight">Announcement</h1>
        </div>
      </div>

      <div class="p-8 md:p-12 space-y-8">
        <p id="announcement-summary" class="text-[#414844] text-lg leading-8 font-medium">—</p>
        <div class="border-t border-[#e4e2de] pt-8">
          <h2 class="font-['Noto_Serif'] text-xl font-bold text-[#002d1c] mb-4">Details</h2>
          <div id="announcement-content" class="text-sm leading-7 text-[#414844] whitespace-pre-wrap">—</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-[#002d1c] py-12 px-6 text-center text-white">
    <div class="max-w-6xl mx-auto flex flex-col items-center gap-4">
      <div class="flex flex-wrap justify-center gap-6 text-sm opacity-80">
        <a href="/privacy" class="hover:opacity-100">Privacy</a>
        <a href="/terms" class="hover:opacity-100">Terms</a>
        <a href="/give" class="hover:opacity-100">Give</a>
        <a href="/contact" class="hover:opacity-100">Contact</a>
      </div>
      <p class="text-xs opacity-50">© 2026 The Sacred Hearth Okitipupa. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="/js/app.js" defer></script>
</body>
</html>
